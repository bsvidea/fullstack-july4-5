<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .seats
        {
            width: 4vw;
            height: 4vw;
            background-color: cornsilk;
            text-align: center;
            font-size: 2em;
            display: inline-block;
            border: 1px solid brown;
            line-height: 4vw;
        }
        #remark
        {
            font-size: 5em;
            width: 10vw;
            height: 10vw;
            border: 1px solid black;
            margin: auto;
            border-radius: 5vw;
            margin-top: 2vw;
            display: none;
            box-shadow: 0px 0px 3px black;
        }
    </style>
    <script>
        function show(num)
        {
            var x=document.getElementById("remark");
            var arr=['&#x1F6B2;','&#x1F3CD;','&#x1F6FA;','&#x1F697;'];
            x.innerHTML=arr[num-1];
            x.style.display='block';
        }
    </script>
</head>
<body>
    <div style="text-align: center;">
        <div id="seat1" class="seats" onclick="show(1)">1</div>
        <div id="seat2" class="seats" onclick="show(2)">2</div>
        <div id="seat3" class="seats" onclick="show(3)">3</div>
        <div id="seat4" class="seats" onclick="show(4)">4</div>
        <div id="remark"></div>
    </div>
    </body>
</html>
