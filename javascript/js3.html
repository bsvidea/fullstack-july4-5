<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script>
        function validate()
        {
            const fmt = /[A-Za-z ]+$/;
            var x=document.getElementById("studentname");
            var y1= fmt.test(x.value);
            if(!y1)
            {
                document.getElementById("errmsg").innerText="Enter only Alphabets in Name";
                x.value="";
                x.focus();
            }
            const fmt1=/^[0-9.]\.[0-9]$/;
            var x1=document.getElementById("cgpa");
            var y2= fmt1.test(x1.value);
            if(!y2)
            {
                document.getElementById("errmsg").innerText="CGPA must a valid number";
                x1.value="";
                x1.focus();
            }
            return y1 && y2;
        }
    </script>
</head>
<body>
    <div class="container bg-dark p-4 mt-5">
        <h1 class="text-warning">Registration Form</h1>
    <form onsubmit="return validate()">
        <div>
            <label class="form-label text-light">Name of the Student</label>
            <input id="studentname" class="form-control" type="text"  required>
        </div>
        <div>
            <label class="form-label text-light">Qualification</label>
            <select class="form-select" >
                <option>BSc</option>
                <option>BCom</option>
                <option>BA</option>
                <option>BE</option>
                <option>BTech</option>
                <option>BCA</option>
                <option>BBA</option>
            </select>
        </div>
        <div>
            <label class="form-label text-light">CGPA</label>
            <input id="cgpa" type="text" class="form-control" required>
        </div>
        <div>
            <button class="btn btn-primary mt-3">Register</button>   
        </div>
        <div id="errmsg" class="text-danger fw-bold">

        </div>
    </form>
    </div>
</body>
</html>
